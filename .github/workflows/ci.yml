name: Java CI + Security Scan

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build and test
        run: mvn -B clean verify

      - name: OWASP dependency-check
        run: mvn -B org.owasp:dependency-check-maven:check

      - name: Generate markdown security report + chart
        run: mvn -B -DskipTests exec:java -Dexec.mainClass=com.demo.SecurityReportGenerator

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            target/dependency-check-report.html
            target/dependency-check-report.xml
            target/security-summary.md
